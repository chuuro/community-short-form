spring:
  application:
    name: community-shortform-backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/shortform_db
    username: ${DB_USERNAME:shortform}
    password: ${DB_PASSWORD:shortform1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080

# 커스텀 설정
app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    whisper-model: whisper-1
    base-url: https://api.openai.com/v1

  storage:
    temp-dir: ${TEMP_DIR:./temp}
    output-dir: ${OUTPUT_DIR:./output}
    bgm-dir: ${BGM_DIR:./bgm}
    temp-ttl-hours: 24

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  rabbitmq:
    render-queue: render.queue
    preview-queue: preview.queue
    exchange: shortform.exchange

  reddit:
    client-id: ${REDDIT_CLIENT_ID:}
    client-secret: ${REDDIT_CLIENT_SECRET:}
    user-agent: CommunityShortform/1.0

  news-api:
    api-key: ${NEWS_API_KEY:}
    base-url: https://newsapi.org/v2
    fetch-limit-on-startup: 3
    default-language: en

  pexels:
    api-key: ${PEXELS_API_KEY:}
    base-url: https://api.pexels.com/v1
    photos-per-keyword: 3
    videos-per-keyword: 2

  minio:
    endpoint: ${MINIO_ENDPOINT:localhost:9000}
    accessKey: ${MINIO_ACCESS_KEY:minioadmin}
    secretKey: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:shortform}
    secure: false

logging:
  level:
    com.shortform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
